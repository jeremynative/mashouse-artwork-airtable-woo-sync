name: Deploy Ma's House WordPress Plugin

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "ma-artwork-airtable-woo-sync.php"
      - "ma-performance-stability-guard.php"
      - "ma-library-fsposter-highlights/**"
      - "README.md"
      - "assets/**"
      - ".github/workflows/deploy-mashouse-plugin.yml"

jobs:
  deploy:
    name: Deploy plugin to mashouse.studio
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate plugin PHP
        run: |
          php -l ma-artwork-airtable-woo-sync.php
          php -l ma-performance-stability-guard.php
          php -l ma-library-fsposter-highlights/ma-library-fsposter-highlights.php
          php -l ma-library-fsposter-highlights/wp-cli-schedule-makeup.php

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SITEGROUND_SSH_KEY }}" > ~/.ssh/siteground_key
          chmod 600 ~/.ssh/siteground_key
          ssh-keyscan -4 -T 20 -p "${{ secrets.SITEGROUND_PORT }}" "${{ secrets.SITEGROUND_HOST }}" >> ~/.ssh/known_hosts || true

      - name: Deploy plugin files
        run: |
          rsync -az --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "DEPLOYMENT.md" \
            --exclude "ma-performance-stability-guard.php" \
            -e "ssh -4 -o StrictHostKeyChecking=accept-new -i ~/.ssh/siteground_key -p ${{ secrets.SITEGROUND_PORT }}" \
            ./ "${{ secrets.SITEGROUND_USER }}@${{ secrets.SITEGROUND_HOST }}:${{ secrets.MASHOUSE_PLUGIN_PATH }}/"

      - name: Deploy stability guard as must-use plugin
        run: |
          scp -4 -o StrictHostKeyChecking=accept-new -i ~/.ssh/siteground_key -P "${{ secrets.SITEGROUND_PORT }}" \
            ma-performance-stability-guard.php \
            "${{ secrets.SITEGROUND_USER }}@${{ secrets.SITEGROUND_HOST }}:/tmp/ma-performance-stability-guard.php"
          ssh -4 -o StrictHostKeyChecking=accept-new -i ~/.ssh/siteground_key -p "${{ secrets.SITEGROUND_PORT }}" \
            "${{ secrets.SITEGROUND_USER }}@${{ secrets.SITEGROUND_HOST }}" \
            "WP_ROOT=\$(cd '${{ secrets.MASHOUSE_PLUGIN_PATH }}/../../..' && pwd); \
             mkdir -p \"\$WP_ROOT/wp-content/mu-plugins\"; \
             mv /tmp/ma-performance-stability-guard.php \"\$WP_ROOT/wp-content/mu-plugins/ma-performance-stability-guard.php\""

      - name: Deploy library highlight scheduler
        run: |
          tar -czf ma-library-fsposter-highlights.tgz ma-library-fsposter-highlights
          scp -4 -o StrictHostKeyChecking=accept-new -i ~/.ssh/siteground_key -P "${{ secrets.SITEGROUND_PORT }}" \
            ma-library-fsposter-highlights.tgz \
            "${{ secrets.SITEGROUND_USER }}@${{ secrets.SITEGROUND_HOST }}:/tmp/ma-library-fsposter-highlights.tgz"
          ssh -4 -o StrictHostKeyChecking=accept-new -i ~/.ssh/siteground_key -p "${{ secrets.SITEGROUND_PORT }}" \
            "${{ secrets.SITEGROUND_USER }}@${{ secrets.SITEGROUND_HOST }}" \
            "WP_ROOT=\$(cd '${{ secrets.MASHOUSE_PLUGIN_PATH }}/../../..' && pwd); \
             rm -rf /tmp/ma-library-fsposter-highlights; \
             tar -xzf /tmp/ma-library-fsposter-highlights.tgz -C /tmp; \
             rm -rf \"\$WP_ROOT/wp-content/plugins/ma-library-fsposter-highlights\"; \
             mkdir -p \"\$WP_ROOT/wp-content/plugins\"; \
             mv /tmp/ma-library-fsposter-highlights \"\$WP_ROOT/wp-content/plugins/ma-library-fsposter-highlights\"; \
             rm -rf /tmp/ma-library-fsposter-highlights /tmp/ma-library-fsposter-highlights.tgz"

      - name: Schedule one-time replacement library highlight
        if: github.event_name == 'push' && github.event.head_commit.message == 'Fix library highlight rotation and schedule makeup'
        run: |
          ssh -4 -o StrictHostKeyChecking=accept-new -i ~/.ssh/siteground_key -p "${{ secrets.SITEGROUND_PORT }}" \
            "${{ secrets.SITEGROUND_USER }}@${{ secrets.SITEGROUND_HOST }}" \
            "WP_ROOT=\$(cd '${{ secrets.MASHOUSE_PLUGIN_PATH }}/../../..' && pwd); \
             wp --path=\"\$WP_ROOT\" eval-file \"\$WP_ROOT/wp-content/plugins/ma-library-fsposter-highlights/wp-cli-schedule-makeup.php\" -- '2026-07-16 18:00:00' 'Rehearsals for Living'"

      - name: Verify deployed file exists
        run: |
          ssh -4 -o StrictHostKeyChecking=accept-new -i ~/.ssh/siteground_key -p "${{ secrets.SITEGROUND_PORT }}" \
            "${{ secrets.SITEGROUND_USER }}@${{ secrets.SITEGROUND_HOST }}" \
            "WP_ROOT=\$(cd '${{ secrets.MASHOUSE_PLUGIN_PATH }}/../../..' && pwd); \
             test -f '${{ secrets.MASHOUSE_PLUGIN_PATH }}/ma-artwork-airtable-woo-sync.php' && \
             test -f \"\$WP_ROOT/wp-content/mu-plugins/ma-performance-stability-guard.php\" && \
             test -f \"\$WP_ROOT/wp-content/plugins/ma-library-fsposter-highlights/ma-library-fsposter-highlights.php\""

      - name: Clear public site caches
        run: |
          ssh -4 -o StrictHostKeyChecking=accept-new -i ~/.ssh/siteground_key -p "${{ secrets.SITEGROUND_PORT }}" \
            "${{ secrets.SITEGROUND_USER }}@${{ secrets.SITEGROUND_HOST }}" \
            "WP_ROOT=\$(cd '${{ secrets.MASHOUSE_PLUGIN_PATH }}/../../..' && pwd); \
            if command -v wp >/dev/null 2>&1; then \
              wp --path=\"\$WP_ROOT\" cache flush || true; \
              wp --path=\"\$WP_ROOT\" rewrite flush --hard || true; \
              wp --path=\"\$WP_ROOT\" sg purge || true; \
              wp --path=\"\$WP_ROOT\" sg-cachepress purge-cache || true; \
              wp --path=\"\$WP_ROOT\" rocket clean --confirm || true; \
              wp --path=\"\$WP_ROOT\" transient delete --all || true; \
            fi; \
            rm -rf \"\$WP_ROOT/wp-content/cache/wp-rocket\" \
                   \"\$WP_ROOT/wp-content/cache/autoptimize\" \
                   \"\$WP_ROOT/wp-content/cache/siteground-optimizer\" \
                   \"\$WP_ROOT/wp-content/cache/sgo-cache\" \
                   \"\$WP_ROOT/wp-content/cache/used-css\" \
                   \"\$WP_ROOT/wp-content/cache/critical-css\" \
                   \"\$WP_ROOT/wp-content/cache/background-css\" \
                   \"\$WP_ROOT/wp-content/cache/busting\" \
                   \"\$WP_ROOT/wp-content/cache/min\" \
                   \"\$WP_ROOT/wp-content/cache/breeze\" \
                   \"\$WP_ROOT/wp-content/cache/wpo-minify\" || true; \
            find \"\$WP_ROOT/wp-content/cache\" -maxdepth 3 -type f \( -name '*.html' -o -name '*.html_gzip' -o -name '*.css' -o -name '*.js' \) -delete 2>/dev/null || true"
